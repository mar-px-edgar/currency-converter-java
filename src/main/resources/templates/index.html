<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" type="text/css" href="style.css">

</head>

<body>
    <div class="container">
        <header>
            <h1>💱 Currency Converter</h1>
            <p class="subtitle">Convert currencies in real-time</p>
        </header>

        <div class="info-box">
            ✓ Real-time exchange rates powered by ExchangeRate-API
        </div>

        <form id="converterForm">
            <div class="currency-row">
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" placeholder="0.00" value="1" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="from">From</label>
                    <select id="from" required>
                        <option value="">Select</option>
                    </select>
                </div>
                <div class="form-group">
                    <button type="button" class="swap-btn" id="swapBtn" title="Swap currencies">⇄</button>
                </div>
            </div>

            <div class="currency-row">
                <div class="form-group">
                    <label for="to">To</label>
                    <select id="to" required>
                        <option value="">Select</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="convert-btn" id="convertBtn">Convert</button>
        </form>

        <div class="error-message" id="errorMessage"></div>

        <div class="result-container" id="resultContainer">
            <div class="result-label" id="resultLabel"></div>
            <div class="result-value" id="resultValue"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
